<h2 class="text-2xl font-bold mt-5">Buscar Gifs</h2>
<h3 class="text-sm text-gray-500">Buscar gifs por nombre, descripción o tags</h3>

<app-search-input
  [placeholder]="'Buscar Gifs'"
  (value)="query.set($event)"
/>


<app-gifs-list
  [gifs]="gifsResource.hasValue() ? gifsResource.value() : []"
  [errorMessage]="gifsResource.error()"
  [isEmpty]="query().trim().length > 0 && gifsResource.hasValue() && gifsResource.value().length === 0"
  [isLoading]="gifsResource.isLoading()"
/>
